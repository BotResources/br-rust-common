[package]
name = "br-service-core"
version = "0.2.0"
edition = "2024"
rust-version = "1.85"
license = "MIT"
description = "Generic service infrastructure core — Passport, RLS, KV, NATS, DB pools, events"
repository = "https://github.com/BotResources/br-service-core"

[dependencies]
axum = "0.8"
sqlx = { version = "0.8", features = ["postgres", "runtime-tokio"] }
async-nats = "0.46"
async-trait = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v7", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
base64 = "0.22"
sha2 = "0.10"
rand = "0.9"
tokio = { version = "1", features = ["full"] }
thiserror = "2"
tracing = "0.1"
dotenvy = "0.15"
futures = "0.3"

[dev-dependencies]
tower = { version = "0.5", features = ["util"] }

[features]
test-support = []
