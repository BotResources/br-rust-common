[package]
name = "br-util-postgres"
version = "0.7.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "Postgres helpers for BotResources services: pools, TLS validation, RLS context, grants"

[dependencies]
br-core-auth = { workspace = true }
sqlx = { workspace = true }
thiserror = { workspace = true }
url = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true }

[dev-dependencies]
# Used only by the `#[ignore]`d live-Postgres tests across role.rs,
# grant.rs, rls.rs, and tests/bootstrap.rs that verify behavior against
# a real cluster (set TEST_DATABASE_URL and run with
# `cargo test -- --ignored`). serde_json is needed to build Passport
# values in the RLS tests; uuid is already a normal dependency.
serde_json = { workspace = true }
tokio = { workspace = true }
