[package]
name = "br-core-integration"
version = "0.2.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "Typed integration-event/command envelopes and IntegrationPublisher trait for cross-bounded-context messaging over NATS"

[dependencies]
br-core-events = { workspace = true }
async-nats = { workspace = true }
async-trait = { workspace = true }
chrono = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true }

[dev-dependencies]
# Used by tests/nats.rs (e2e roundtrip against a real JetStream broker).
# futures-util gives us StreamExt::next() on the JetStream pull consumer;
# br-core-kernel supplies Actor for the envelope metadata.
br-core-kernel = { workspace = true }
futures-util = { workspace = true }
tokio = { workspace = true }
