name: release-tags

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-tags
  cancel-in-progress: false

jobs:
  tag:
    name: Auto-tag the workspace version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Verify changelog entry before tagging
        run: bash .github/scripts/check-changelog.sh

      - name: Tag and release the workspace version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          version=$(grep -m1 '^version = ' Cargo.toml | sed -E 's/^version = "([^"]+)".*/\1/')
          if [ -z "$version" ]; then
            echo "::error::could not extract [workspace.package] version from Cargo.toml"
            exit 1
          fi
          tag="v${version}"
          changelog="CHANGELOG.md"

          if git rev-parse --verify "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "✓ tag ${tag} already exists"
          else
            echo "→ creating tag ${tag}"
            git tag -a "${tag}" \
              -m "br-rust-common ${version}" \
              -m "Auto-tagged from main. See ${changelog} for the entry."
            git push origin "${tag}"
          fi

          if gh release view "${tag}" >/dev/null 2>&1; then
            echo "✓ release ${tag} already exists"
          else
            echo "→ creating release ${tag}"
            notes_file=$(mktemp)
            awk -v target="## [${version}]" '
              index($0, target) == 1 { in_section = 1; print; next }
              in_section && index($0, "## [") == 1 { exit }
              in_section { print }
            ' "$changelog" > "$notes_file"
            if [ ! -s "$notes_file" ]; then
              echo "::warning file=${changelog}::could not extract notes for ${tag}; using placeholder"
              printf 'See [%s](https://github.com/%s/blob/%s/%s) for changes.\n' \
                "$changelog" "$GITHUB_REPOSITORY" "$tag" "$changelog" > "$notes_file"
            fi
            gh release create "${tag}" \
              --title "br-rust-common ${version}" \
              --notes-file "$notes_file" \
              --verify-tag
            rm -f "$notes_file"
          fi
