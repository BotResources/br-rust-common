name: release-tags

# After every push to main, scan crates/*/Cargo.toml and create any missing
# `<crate>-vX.Y.Z` tag. This is how a crate is "released" — downstream
# consumers pin to a git tag, so creating the tag is the publish step.
#
# The version bump itself happens in a normal PR; this workflow only converts
# the merged Cargo.toml state into tags. Idempotent: re-running does nothing
# once all versions are tagged.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-tags
  cancel-in-progress: false

jobs:
  tag:
    name: Auto-tag per-crate versions
    runs-on: arc-ubuntu
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Tag missing per-crate versions
        run: |
          set -euo pipefail
          shopt -s nullglob
          created=0
          for toml in crates/*/Cargo.toml; do
            crate=$(basename "$(dirname "$toml")")
            version=$(grep -m1 '^version = ' "$toml" | sed -E 's/^version = "([^"]+)".*/\1/')
            if [ -z "$version" ]; then
              echo "::error::could not extract version from $toml"
              exit 1
            fi
            tag="${crate}-v${version}"
            if git rev-parse --verify "refs/tags/${tag}" >/dev/null 2>&1; then
              echo "✓ ${tag} already exists"
              continue
            fi
            echo "→ creating ${tag}"
            git tag -a "${tag}" \
              -m "${crate} ${version}" \
              -m "Auto-tagged from main. See crates/${crate}/CHANGELOG.md for the entry."
            git push origin "${tag}"
            created=$((created + 1))
          done
          echo "Created ${created} tag(s)."
