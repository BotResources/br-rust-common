name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt-clippy-test:
    name: cargo fmt + clippy + test
    runs-on: arc-ubuntu
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: cargo test
        run: cargo test --workspace --all-targets --locked

  msrv:
    name: MSRV 1.88 build
    runs-on: arc-ubuntu
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"
      - uses: Swatinem/rust-cache@v2
        with:
          key: msrv
      - run: cargo build --workspace --locked

  docs:
    name: cargo doc
    runs-on: arc-ubuntu
    env:
      RUSTDOCFLAGS: -Dwarnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: docs
      - run: cargo doc --workspace --no-deps --locked

  deny:
    name: cargo-deny check
    runs-on: arc-ubuntu
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans licenses sources

  unused-deps:
    name: cargo-machete (unused deps)
    runs-on: arc-ubuntu
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-machete
      - run: cargo machete

  semver:
    name: cargo semver-checks
    runs-on: arc-ubuntu
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: semver
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-semver-checks
      - name: cargo semver-checks (per-crate)
        # For each crate, baseline = its own latest tag (`<crate>-vX.Y.Z`).
        # When `Cargo.toml` version > latest tag, semver-checks allows
        # breaking changes proportional to the bump; when versions match,
        # it enforces "no API change". Crates without any prior tag are
        # skipped (first release).
        run: |
          set -euo pipefail
          shopt -s nullglob
          fail=0
          for toml in crates/*/Cargo.toml; do
            crate=$(basename "$(dirname "$toml")")
            latest=$(git tag --list "${crate}-v*" | sort -V | tail -n1)
            if [ -z "$latest" ]; then
              echo "::notice::no prior tag for ${crate}, skipping semver-checks"
              continue
            fi
            echo "::group::${crate} vs ${latest}"
            if ! cargo semver-checks -p "${crate}" --baseline-rev "${latest}"; then
              fail=1
            fi
            echo "::endgroup::"
          done
          exit $fail

  trufflehog:
    name: trufflehog (secret scan)
    runs-on: arc-ubuntu
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --results=verified,unknown

  e2e-nats:
    name: e2e (br-core-integration vs NATS JetStream)
    runs-on: arc-ubuntu
    # NATS image needs `-js` (enable JetStream) and `-m 8222` (monitoring
    # for healthcheck), but GHA `services:` has no way to override an
    # image's CMD. We run the broker via `docker run` directly — works on
    # ARC because each runner pod ships with a dind sidecar.
    env:
      NATS_URL: nats://localhost:4222
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: e2e-nats
      - name: start NATS JetStream broker
        run: |
          docker run -d --name nats-jetstream \
            -p 4222:4222 -p 8222:8222 \
            nats:2-alpine -js -m 8222
          # Wait for /healthz to flip to "ok" before letting tests fire.
          # NATS starts in <1s normally; 30 retries × 1s is generous
          # cover for cold-pulled image + slow runner.
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8222/healthz >/dev/null 2>&1; then
              echo "NATS ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "NATS failed to become healthy within 30s" >&2
          docker logs nats-jetstream >&2
          exit 1
      - name: cargo test (live NATS tests)
        # --test-threads=1: tests share a single JetStream namespace
        # and each one creates/deletes its own stream; sequential
        # execution avoids racy create/delete ordering against the
        # broker. Aligns with the e2e-postgres job's reasoning.
        run: cargo test -p br-core-integration --locked -- --ignored --test-threads=1
      - name: stop NATS
        if: always()
        run: docker rm -f nats-jetstream || true
