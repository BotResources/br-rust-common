name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt-clippy-test:
    name: cargo fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: cargo test
        run: cargo test --workspace --all-targets --locked

  msrv:
    name: MSRV 1.88 build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"
      - uses: Swatinem/rust-cache@v2
        with:
          key: msrv
      - run: cargo build --workspace --locked

  docs:
    name: cargo doc
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -Dwarnings
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: docs
      - run: cargo doc --workspace --no-deps --locked

  deny:
    name: cargo-deny check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans licenses sources

  unused-deps:
    name: cargo-machete (unused deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-machete
      - run: cargo machete

  semver:
    name: cargo semver-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: semver
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-semver-checks
      - name: cargo semver-checks (per-crate)
        # For each crate, baseline = its own latest tag (`<crate>-vX.Y.Z`).
        # When `Cargo.toml` version > latest tag, semver-checks allows
        # breaking changes proportional to the bump; when versions match,
        # it enforces "no API change". Crates without any prior tag are
        # skipped (first release).
        run: |
          set -euo pipefail
          shopt -s nullglob
          fail=0
          for toml in crates/*/Cargo.toml; do
            crate=$(basename "$(dirname "$toml")")
            latest=$(git tag --list "${crate}-v*" | sort -V | tail -n1)
            if [ -z "$latest" ]; then
              echo "::notice::no prior tag for ${crate}, skipping semver-checks"
              continue
            fi
            echo "::group::${crate} vs ${latest}"
            if ! cargo semver-checks -p "${crate}" --baseline-rev "${latest}"; then
              fail=1
            fi
            echo "::endgroup::"
          done
          exit $fail

  changelog:
    name: changelog entry per Cargo.toml version
    runs-on: ubuntu-latest
    # Gate: every crate's current Cargo.toml version must have a matching
    # `## [X.Y.Z]` section in its CHANGELOG.md. Catches the "bumped version
    # but forgot the changelog entry" mistake at PR time, before the
    # release-tags workflow would push an undocumented tag.
    steps:
      - uses: actions/checkout@v5
      - name: check changelog entries
        run: bash .github/scripts/check-changelog.sh

  trufflehog:
    name: trufflehog (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --results=verified,unknown

  e2e-postgres:
    name: e2e (br-util-postgres vs PG 16)
    runs-on: ubuntu-latest
    # Closes issue #13. Two regressions (0.5.0, 0.5.1) shipped because
    # `ensure_app_role` was never exercised against a real PG with the
    # production privilege model (non-superuser CREATEROLE caller). The
    # `#[ignore]`-gated `live_tests` module in crates/br-util-postgres/
    # src/role.rs bootstraps that caller from the admin URL below and
    # runs the rotation / idempotence / dollar-password scenarios.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: e2e-postgres
      - name: cargo test (live PG tests)
        # --test-threads=1: the live tests bootstrap a non-superuser
        # CREATEROLE owner per test, then run `GRANT ON ALL TABLES IN
        # SCHEMA public TO <app>`. With parallel tests, owner A's GRANT
        # iterates over tables owned by owner B and fails with
        # "permission denied for table". Sequential matches the
        # single-service / single-database production shape.
        run: cargo test -p br-util-postgres --locked -- --ignored --test-threads=1

  e2e-postgres-tls:
    name: e2e (br-util-postgres TLS handshake)
    runs-on: ubuntu-latest
    # Proves the sqlx TLS backend works end-to-end against a TLS-enabled
    # Postgres, not just that it is compiled in (the `backend_is_compiled_in`
    # test in the e2e-postgres job covers the compiled-in half against a
    # plaintext server). GHA `services:` cannot mount a generated cert or
    # override the image command to pass `-c ssl=on`, so — like e2e-nats —
    # the server is started via `docker run` in a step.
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      # SHA-pinned: @stable doubles as the toolchain selector, so name it
      # explicitly via `toolchain:` now that the ref is a SHA.
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: e2e-postgres-tls
      - name: start TLS-enabled Postgres
        run: |
          set -euo pipefail
          certdir="$(mktemp -d)"
          # Self-signed cert. CN/SAN are irrelevant for trust because the test
          # connects with sslmode=require (encrypt, do not verify the cert) —
          # exactly the remote-host posture validate_database_tls enforces.
          # BUT the cert must be X.509 **v3**: rustls/webpki rejects a v1 cert
          # with UnsupportedCertVersion at parse time, before the
          # accept-invalid-cert policy applies. `-addext` forces v3.
          openssl req -new -x509 -days 1 -nodes \
            -subj "/CN=localhost" -addext "subjectAltName=DNS:localhost" \
            -out "$certdir/server.crt" -keyout "$certdir/server.key"
          # Postgres requires the key to be owned by the run-as user (uid 70
          # in postgres:16-alpine) and mode 600, or it refuses to start.
          chmod 600 "$certdir/server.key"
          sudo chown 70:70 "$certdir/server.crt" "$certdir/server.key"
          docker run -d --name pg-tls \
            -e POSTGRES_USER=postgres -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=postgres \
            -p 5432:5432 \
            -v "$certdir/server.crt:/etc/pg/server.crt:ro" \
            -v "$certdir/server.key:/etc/pg/server.key:ro" \
            postgres:16-alpine \
            -c ssl=on -c ssl_cert_file=/etc/pg/server.crt \
            -c ssl_key_file=/etc/pg/server.key
          for i in $(seq 1 30); do
            if docker exec pg-tls pg_isready -U postgres >/dev/null 2>&1; then
              echo "Postgres (TLS) ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Postgres failed to become healthy within 30s" >&2
          docker logs pg-tls >&2
          exit 1
      - name: cargo test (TLS handshake)
        env:
          # Drives only full_handshake_succeeds; the other live tests skip
          # silently because TEST_DATABASE_URL is unset in this job.
          TEST_TLS_DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
        run: cargo test -p br-util-postgres --locked -- --ignored full_handshake_succeeds
      - name: stop Postgres
        if: always()
        run: docker rm -f pg-tls || true

  e2e-nats:
    name: e2e (br-core-integration vs NATS JetStream)
    runs-on: ubuntu-latest
    # GHA `services:` cannot override an image's CMD, but NATS needs
    # `-js` (enable JetStream) and `-m 8222` (monitoring for healthcheck).
    # We start the broker via `docker run` in a step — works on ARC
    # because each runner pod ships with a dind sidecar.
    env:
      NATS_URL: nats://localhost:4222
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: e2e-nats
      - name: start NATS JetStream broker
        run: |
          docker run -d --name nats-jetstream \
            -p 4222:4222 -p 8222:8222 \
            nats:2-alpine -js -m 8222
          # Wait for /healthz to flip to "ok" before letting tests fire.
          # NATS starts in <1s normally; 30 retries × 1s is generous
          # cover for cold-pulled image + slow runner.
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8222/healthz >/dev/null 2>&1; then
              echo "NATS ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "NATS failed to become healthy within 30s" >&2
          docker logs nats-jetstream >&2
          exit 1
      - name: cargo test (live NATS tests)
        # --test-threads=1: tests share a single JetStream namespace and
        # each one creates/deletes its own stream; sequential execution
        # avoids racy create/delete ordering. Same reasoning as the
        # e2e-postgres job.
        run: cargo test -p br-core-integration --locked -- --ignored --test-threads=1
      - name: stop NATS
        if: always()
        run: docker rm -f nats-jetstream || true

  coverage:
    name: coverage (per-crate, UT vs UT+E2E)
    runs-on: ubuntu-latest
    # Per-crate × {UT only, UT+E2E} so the Δ column shows exactly how much
    # of each crate is protected *only* by the e2e jobs — that is the
    # surface that would silently regress if those jobs were skipped.
    # Needs *both* backends (PG + NATS) up while the --ignored tests run,
    # otherwise br-util-postgres or br-core-integration live tests
    # early-return and contribute 0 to the E2E column.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
      NATS_URL: nats://localhost:4222
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          key: coverage
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: start NATS JetStream broker
        # Same docker-run pattern as e2e-nats: GHA services can't pass
        # `-js`, so we start NATS by hand. Without this the broker is
        # absent and the br-core-integration live tests early-return,
        # leaving NatsIntegrationPublisher uncovered in the E2E column.
        run: |
          docker run -d --name nats-jetstream \
            -p 4222:4222 -p 8222:8222 \
            nats:2-alpine -js -m 8222
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8222/healthz >/dev/null 2>&1; then
              echo "NATS ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "NATS failed to become healthy within 30s" >&2
          docker logs nats-jetstream >&2
          exit 1
      # Flow rationale (cargo-llvm-cov 0.8.x):
      #   - clean → start from a known empty profile state.
      #   - --no-report run #1 builds + runs UT without emitting a report,
      #     keeping the profile data around for the snapshot.
      #   - `report --json` snapshots UT-only into coverage-ut.json.
      #   - --no-clean run #2 runs the #[ignore]'d e2e tests on top of the
      #     existing profile data; it does auto-emit a report to console
      #     (that we ignore — the snapshot below is what we keep). The
      #     `--no-report --no-clean` combo is explicitly rejected by
      #     cargo-llvm-cov, so we accept the spurious console report.
      #   - `report --json` after the e2e run captures UT+E2E.
      - name: clean coverage profile
        run: cargo llvm-cov clean --workspace
      - name: instrument + run unit tests (no report)
        run: cargo llvm-cov --workspace --locked --no-report
      - name: snapshot UT-only report
        run: cargo llvm-cov report --json --output-path coverage-ut.json
      - name: instrument + run e2e tests (accumulating)
        # See e2e-postgres job comment for why --test-threads=1.
        run: cargo llvm-cov --workspace --locked --no-clean -- --ignored --test-threads=1
      - name: snapshot UT+E2E report
        run: cargo llvm-cov report --json --output-path coverage-ut-e2e.json
      - name: generate lcov (UT+E2E)
        run: cargo llvm-cov report --lcov --output-path coverage.lcov
      - name: per-crate summary (UT vs UT+E2E)
        run: bash .github/scripts/coverage-summary.sh coverage-ut.json coverage-ut-e2e.json >> "$GITHUB_STEP_SUMMARY"
      - name: upload lcov artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage.lcov
          if-no-files-found: error
      - name: stop NATS
        if: always()
        run: docker rm -f nats-jetstream || true
