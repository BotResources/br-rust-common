name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt-clippy-test:
    name: cargo fmt + clippy + test
    runs-on: arc-ubuntu
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: cargo test
        run: cargo test --workspace --all-targets --locked

  msrv:
    name: MSRV 1.85 build
    runs-on: arc-ubuntu
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85"
      - uses: Swatinem/rust-cache@v2
        with:
          key: msrv
      - run: cargo build --workspace --locked

  docs:
    name: cargo doc
    runs-on: arc-ubuntu
    env:
      RUSTDOCFLAGS: -Dwarnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: docs
      - run: cargo doc --workspace --no-deps --locked

  deny:
    name: cargo-deny check
    runs-on: arc-ubuntu
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans licenses sources

  unused-deps:
    name: cargo-machete (unused deps)
    runs-on: arc-ubuntu
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-machete
      - run: cargo machete

  semver:
    name: cargo semver-checks
    runs-on: arc-ubuntu
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: semver
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-semver-checks
      - name: cargo semver-checks (per-crate)
        # For each crate, baseline = its own latest tag (`<crate>-vX.Y.Z`).
        # When `Cargo.toml` version > latest tag, semver-checks allows
        # breaking changes proportional to the bump; when versions match,
        # it enforces "no API change". Crates without any prior tag are
        # skipped (first release).
        run: |
          set -euo pipefail
          shopt -s nullglob
          fail=0
          for toml in crates/*/Cargo.toml; do
            crate=$(basename "$(dirname "$toml")")
            latest=$(git tag --list "${crate}-v*" | sort -V | tail -n1)
            if [ -z "$latest" ]; then
              echo "::notice::no prior tag for ${crate}, skipping semver-checks"
              continue
            fi
            echo "::group::${crate} vs ${latest}"
            if ! cargo semver-checks -p "${crate}" --baseline-rev "${latest}"; then
              fail=1
            fi
            echo "::endgroup::"
          done
          exit $fail

  trufflehog:
    name: trufflehog (secret scan)
    runs-on: arc-ubuntu
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --results=verified,unknown
