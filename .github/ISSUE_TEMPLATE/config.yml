# Issues are disabled at the repository level. This config is defense-in-depth
# in case the Issues feature is ever re-enabled by mistake: it removes the
# blank-issue option and points anyone landing here at the correct channels.
blank_issues_enabled: false
contact_links:
  - name: Commercial contact (clients)
    url: https://botresources.ai
    about: This repository does not accept external issues. Clients — please contact your BR account manager.
  - name: Security report (private)
    url: https://github.com/BotResources/br-rust-common/blob/main/SECURITY.md
    about: Report security issues privately by email — see SECURITY.md. Do not open a public issue.
